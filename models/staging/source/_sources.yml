  - name: crm_tos_orders
    description: Commercial orders placed through Zaam channel partners. Each row
      is one order covering device purchase, subscription bundling, and checkout lifecycle
      from payment through delivery or cancellation.
    columns:
    - name: id
      data_type: character
      description: Primary key for the order record in SuiteCRM.
      data_tests:
      - unique
      - not_null
    - name: name
      data_type: character
      description: Name.
    - name: date_entered
      data_type: timestamp with time zone
      description: Date entered.
    - name: date_modified
      data_type: timestamp with time zone
      description: Date modified.
    - name: modified_user_id
      data_type: character
      description: Modified user id.
    - name: created_by
      data_type: character
      description: Created by.
    - name: description
      data_type: text
      description: Description.
    - name: deleted
      data_type: boolean
      description: SuiteCRM soft-delete flag; exclude from analytics when true.
    - name: assigned_user_id
      data_type: character
      description: Assigned user id.
    - name: order_number
      data_type: character
      description: Order number.
    - name: order_status
      data_type: character
      description: Current lifecycle status of the order (e.g. delivered, cancelled).
      data_tests:
      - accepted_values:
          values:
          - cancelled
          - delivered
          - expired
          - rejected
          - waiting_for_delivery
    - name: valid_until
      data_type: timestamp with time zone
      description: Valid until.
    - name: total_subscription_value
      data_type: double precision
      description: Total subscription value.
    - name: total_device_purchase_price
      data_type: double precision
      description: Total device purchase price.
    - name: phone_number
      data_type: character
      description: Phone number.
    - name: customer_id
      data_type: character
      description: Foreign key to the customer account that placed the order.
      data_tests:
      - relationships:
