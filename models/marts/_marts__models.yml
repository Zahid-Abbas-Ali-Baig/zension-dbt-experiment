version: 2
models:
- name: fct_orders
  description: 'Order-level sales fact. One row per commercial order with GMV, partner/program
    context, and fulfillment flags. KPI linkage: order_count, gmv_sar, preorder_order_share,
    avg_days_payment_to_delivery, median_order_to_delivery_days.'
  columns:
  - name: order_id
    data_type: character
    description: Natural key for the commercial order.
    data_tests:
    - unique
    - not_null
  - name: order_date
    data_type: date
    description: ''
  - name: customer_id
    data_type: text
    description: FK to dim_customers.
    data_tests:
    - relationships:
        to: ref('dim_customers')
        field: customer_id
  - name: program_id
    data_type: text
    description: FK to dim_programs.
    data_tests:
    - relationships:
        to: ref('dim_programs')
        field: program_id
  - name: channel_partner_id
    data_type: text
    description: FK to dim_channel_partners.
    data_tests:
    - relationships:
        to: ref('dim_channel_partners')
        field: channel_partner_id
  - name: order_number
    data_type: text
    description: ''
  - name: order_status
    data_type: text
    description: ''
  - name: order_type
    data_type: text
    description: ''
  - name: sales_channel
    data_type: text
    description: ''
  - name: delivered_at
    data_type: date
    description: ''
  - name: is_preorder
    data_type: boolean
    description: ''
  - name: is_voided
    data_type: boolean
    description: ''
  - name: is_gmv_eligible
    data_type: boolean
    description: True when order is not voided/cancelled/rejected/expired.
  - name: has_valid_customer
    data_type: boolean
    description: ''
  - name: has_valid_program
    data_type: boolean
    description: ''
  - name: gmv_amount_sar
    data_type: numeric
    description: Gross merchandise value in SAR (tax inclusive).
  - name: total_discount_amount
    data_type: numeric
    description: ''
  - name: total_amount_incl_vat
    data_type: numeric
    description: ''
- name: fct_order_items
